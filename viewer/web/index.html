<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="viewer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>viewer</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    API: por defeito mesmo host + porta 8000 (LAN / Docker local).
    Ngrok (dois túneis): abra o site com ?api_base=URL_ENCODED_DO_TUNEL_API
    Ex.: ?api_base=https%3A%2F%2Fxxxx.ngrok-free.app
    O valor fica em sessionStorage para não perder ao navegar no SPA.
  -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('api_base');
      if (q) {
        try {
          q = decodeURIComponent(q);
        } catch (e) {}
        q = String(q).trim().replace(/\/+$/, '');
        if (q) {
          sessionStorage.setItem('jjb_api_base_url', q);
        }
      }
      var stored = sessionStorage.getItem('jjb_api_base_url');
      if (stored) {
        window.__API_BASE_URL__ = stored;
      } else {
        window.__API_BASE_URL__ =
          window.location.protocol + '//' + window.location.hostname + ':8000';
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
