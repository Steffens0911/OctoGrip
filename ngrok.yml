# Uso: na raiz do repositório, com Docker expondo 8001 (API no host) e 8080 (viewer):
#   ngrok start --all --config .\ngrok.yml
# Token: ngrok config add-authtoken <seu_token> (não coloque o token neste ficheiro)
version: "2"
tunnels:
  api:
    addr: 8001
    proto: http
  web:
    addr: 8080
    proto: http
