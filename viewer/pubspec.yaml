name: viewer
description: OctoGrip — app para academias de Jiu-Jitsu (campo de treino, academia e admin).
publish_to: 'none'
version: 1.2.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies aligned with Flutter 3 / Dart 3 (Context7 docs: Material 3, ThemeData.colorScheme, TextTheme M3 names).
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dartz: ^0.10.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  logging: ^1.2.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  flutter_svg: ^2.0.10+1
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^10.0.0
  google_fonts: ^6.2.1
  http: ^1.2.0
  http_parser: ^4.0.0
  pointer_interceptor: ^0.10.1+2
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  file_picker: ^8.0.0
  url_launcher: ^6.2.0
  file_saver: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  figma_puller: ^1.0.1

dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/branding/flowroll_app_icon.png
    - assets/branding/flowroll_wordmark.png
    - assets/branding/octogrip_logo.png
