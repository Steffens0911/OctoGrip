name: viewer
description: App viewer JJB com seção de administração.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^10.0.0
  google_fonts: ^6.2.1
  http: ^1.1.0
  http_parser: ^4.0.0
  pointer_interceptor: ^0.10.1+2
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  file_picker: ^8.0.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  figma_puller: ^1.0.1

dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
