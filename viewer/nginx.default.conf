# Servir o build Flutter web. Entradas sem hash no nome: forçar revalidação para o Chrome
# não ficar com bundle antigo (ícones/AppBar em falta) após novo deploy.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /main.dart.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /flutter.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
