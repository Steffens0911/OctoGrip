<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FlowRoll — treino, academia e progresso no Jiu-Jitsu.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FlowRoll">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FlowRoll</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    API: por defeito mesmo host + porta 8000 (LAN / Docker local).
    trycloudflare.com: o Chrome bloqueia chamadas de páginas HTTPS públicas para 127.0.0.1. É obrigatório
    um segundo túnel na API (uvicorn :8000) e abrir o viewer com ?api_base=URL_HTTPS_DO_TUNEL_DA_API (fica em sessionStorage).
    Ex.: cloudflared tunnel --url http://127.0.0.1:8000 → use a URL trycloudflare na query api_base.
  -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('api_base');
      if (q) {
        try {
          q = decodeURIComponent(q);
        } catch (e) {}
        q = String(q).trim().replace(/\/+$/, '');
        if (q) {
          sessionStorage.setItem('jjb_api_base_url', q);
        }
      }
      var stored = sessionStorage.getItem('jjb_api_base_url');
      var h = window.location.hostname;
      if (stored && h.endsWith('.trycloudflare.com')) {
        if (/\.trycloudflare\.com:8000\b/.test(stored) ||
            /^https?:\/\/127\.0\.0\.1:8000/.test(stored) ||
            /^https?:\/\/localhost:8000/.test(stored)) {
          try {
            sessionStorage.removeItem('jjb_api_base_url');
          } catch (e) {}
          stored = null;
        }
      }
      if (stored) {
        window.__API_BASE_URL__ = stored;
      } else {
        if (h === 'localhost' || h === '127.0.0.1') {
          window.__API_BASE_URL__ =
            window.location.protocol + '//' + h + ':8000';
        } else if (h.endsWith('.trycloudflare.com')) {
          window.__API_BASE_URL__ = '';
        } else {
          window.__API_BASE_URL__ =
            window.location.protocol + '//' + h + ':8000';
        }
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
