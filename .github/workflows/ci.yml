name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t jjb-api:test .

      - name: Verify image runs
        run: |
          docker run --rm -d --name jjb-test -p 8000:8000 \
            -e DATABASE_URL=sqlite:///test.db \
            jjb-api:test || true
          sleep 3
          docker stop jjb-test 2>/dev/null || true
